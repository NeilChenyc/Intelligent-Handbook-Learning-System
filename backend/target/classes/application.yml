server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: learning-platform-backend
  
  datasource:
    url: jdbc:postgresql://db.supabase.co:5432/postgres
    username: ${SUPABASE_DB_USERNAME:your_username}
    password: ${SUPABASE_DB_PASSWORD:your_password}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER:https://your-project.supabase.co/auth/v1}

# LangChain4j Configuration
langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:your_openai_api_key}
      model-name: gpt-3.5-turbo
      temperature: 0.7
      max-tokens: 1000

# Logging Configuration
logging:
  level:
    com.quiz: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# CORS Configuration
cors:
  allowed-origins: 
    - http://localhost:3000
    - https://your-frontend-domain.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true

# Custom Application Properties
app:
  jwt:
    secret: ${JWT_SECRET:your_jwt_secret_key_here}
    expiration: 86400000 # 24 hours in milliseconds
  
  supabase:
    url: ${SUPABASE_URL:https://your-project.supabase.co}
    anon-key: ${SUPABASE_ANON_KEY:your_anon_key}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your_service_role_key}